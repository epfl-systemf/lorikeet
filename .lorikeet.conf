rules = [
  {
    name = "Infix +"
    description = "Rewrite infix + operator"
    match-ascriptions = true
    pattern = """`?x`.+(`?y`)"""
    rewrite = """`?x` + `?y`"""
  }
  {
    name = "Infix -"
    description = "Rewrite infix - operator"
    match-ascriptions = true
    pattern = """(?{x := _}).-(?{y := _})"""
    rewrite = """`?x` - `?y`"""
  }
  {
    name = "Infix *"
    description = "Rewrite infix * operator"
    match-ascriptions = true
    pattern = """(?{x := _}).*(?{y := _})"""
    rewrite = """`?x` * `?y`"""
  }
  {
    name = "Infix /"
    description = "Rewrite infix / operator"
    match-ascriptions = true
    pattern = """(?{x := _})./(?{y := _})"""
    rewrite = """`?x` / `?y`"""
  }
  {
    name = "Inline Helper Function"
    description = "Inline a helper function that is immediately invoked"
    pattern = """
    def `?f1`(@mult `?args`: `?argtypes`): `?t1` =
      def `?f2`(@mult `?args2`: `?argtypes`): `?t1` =
        `?b`
      `?f2`(`?args`: @mult)
    """
    rewrite = """
    def `?f1`(@mult `?args`: `?argtypes`): `?t1` =
      `?b`(`?f2` --> `?f1`, `?args2` --> `?args`: @mult)
    """
  }
  {
    name="Placeholder Syntax (single param)"
    description="Rewrite single-parameter anonymous functions using placeholder syntax"
    pattern="""
    (`?x`: String) => `?body`
    """
    rewrite="""
    `?body`(`?x` --> _)
    """
  }
  {
    name="Placeholder Syntax (two params)"
    description="Rewrite two-parameter anonymous functions using placeholder syntax"
    pattern="""
    (`?acc`: Int, `?x`: String) => `?body`
    """
    rewrite="""
    `?body`(`?acc` --> _, `?x` --> _)
    """
  }
  {
    name="Expand Map to Match"
    description="Expand List.map calls to explicit pattern matching"
    pattern="""
    def `?ex`(`?l`: List[Int]): `?t` =
      `?l`.map((`?x`: Int) => `?f`)
    """
    rewrite="""
    def `?ex`(`?l`: List[Int]): `?t` =
      `?l` match
        case Nil => Nil
        case head :: tail =>
          `?f`(`?x` --> head) :: `?ex`(tail)
    """
  }
  {
    name = "Var Usage"
    description = "Don't use vars"
    pattern = """
    var `?v`: `?` = `?init`
    """
  }
  {
    name = "Simplify Match"
    description = "Simplify match expressions by removing unnecessary variable bindings"
    pattern = """
    `?expr` match
      case Some(`?v`) => ?{(a := _) including (0 `?v`)}
      case _       => "ok"
    """
    rewrite = """
    `?expr` match
      case Some(_) => `?a`
      case _       => "ok"
    """
  }
  {
    name = "Simplify Match with If Guard"
    description = "Simplify match expressions by removing unnecessary variable bindings"
    pattern = """
    `?expr` match
      case Some(`?v`) if ?{(b := _) including (0 `?v`)} => ?{(a := _) including (0 `?v`)}
      case _       => "ok"
    """
    rewrite = """
    `?expr` match
      case Some(_) if `?b` => `?a`
      case _       => "ok"
    """
  }
  {
    name="Int Ascription Eq"
    pattern="""
    (`?a`: Int) == (`?b`: Int)
    """
    rewrite="""
    `?a` == `?b`
    """
  }
  {
    name="List Ascription Eq"
    pattern="""
    (`?a1`: List[`?t1`]) == (`?a2`: List[`?t1`])
    """
    rewrite="""
    `?a1` == `?a2`
    """
  }
  {
    name="Implicit to Using"
    pattern="""
    def `?f`(@mult `?params`: `?tpes`)(implicit @mult `?implicits`: `?itpes`): `?t` = `?body`
    """
    rewrite="""
    def `?f`(@mult `?params`: `?tpes`)(using @mult `?implicits`: `?itpes`): `?t` = `?body`
    """
  }
]